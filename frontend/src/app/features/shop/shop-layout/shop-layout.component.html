<div class="shell">
  <header class="top-bar">
    <div class="top-left">
      <span class="brand">Festival App</span>
      <nav class="top-nav">
        <a routerLink="/shop/tickets" routerLinkActive="active-link" class="nav-link">🎫 Tickets</a>
        <a routerLink="/shop/my-tickets" routerLinkActive="active-link" class="nav-link">🧾 My Tickets</a>
      </nav>
    </div>
    <div class="user-info">
      @if (currentUser?.buyer && currentUser!.buyer!.tier !== 'STANDARD') {
        <span class="tier-badge tier-{{ currentUser!.buyer!.tier | lowercase }}">
          {{ tierLabel }}
        </span>
      }
      <span class="username">{{ displayName }}</span>
      <button (click)="logout()">Sign out</button>
    </div>
  </header>

  <main class="content">
    <router-outlet />
  </main>
</div>
