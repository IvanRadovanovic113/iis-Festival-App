<div class="form-page">
  <aside class="sidebar">
    <div class="avatar">JV</div>
    <div class="nav-card active">Festivals</div>
    <div class="nav-card">Notifications</div>
    <div class="nav-card">Statistics</div>
    <button class="logout-btn" type="button" (click)="logout()">Log out</button>
  </aside>

  <main class="content">
    <header class="header">
      <a [routerLink]="workspace ? ['/manager/festivals', workspace.campaign.festivalId, 'campaign'] : ['/manager/festivals']" class="back-link">← Back to adds</a>
      <h1>Create add</h1>
    </header>

    @if (errorMessage) {
      <div class="error-banner">{{ errorMessage }}</div>
    }

    <section class="card">
      <form [formGroup]="form" (ngSubmit)="save()">
        <div class="grid">
          <label class="field">
            <span>Add name *</span>
            <input type="text" formControlName="name" />
          </label>

          <label class="field field-tall">
            <span>Add description *</span>
            <textarea rows="6" formControlName="description"></textarea>
          </label>

          <div class="field">
            <span>Add type *</span>
            <div class="inline-field">
              <select formControlName="adTypeId">
                <option [ngValue]="null" disabled>Select type</option>
                @for (type of adTypes; track type.adTypeId) {
                  <option [ngValue]="type.adTypeId">{{ type.name }}</option>
                }
              </select>
              <a class="secondary-btn" [routerLink]="['/manager/campaigns', workspace?.campaign?.campaignId ?? 0, 'ad-types', 'new']">New type</a>
            </div>
          </div>

          <div class="field field-full">
            <span>Content</span>
            <label class="upload-box">
              <input type="file" (change)="onFileSelected($event)" hidden />
              <strong>Upload content</strong>
              <small>{{ selectedFileName || 'Select a file from your computer' }}</small>
            </label>
          </div>
        </div>

        <div class="actions">
          <a class="cancel-btn" [routerLink]="workspace ? ['/manager/festivals', workspace.campaign.festivalId, 'campaign'] : ['/manager/festivals']">Cancel</a>
          <button class="create-btn" type="submit" [disabled]="saving">{{ saving ? 'Creating...' : 'Create' }}</button>
        </div>
      </form>
    </section>
  </main>
</div>
