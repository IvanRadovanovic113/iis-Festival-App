<div class="shell">
  <header class="top-bar">
    <span class="brand">Festival App</span>
    <div class="user-actions">
      @if (currentUser) {
        <span class="username">{{ currentUser.username }}</span>
      }
      <button (click)="logout()">Sign out</button>
    </div>
  </header>

  <div class="body">
    <nav class="sidebar">
      @if (currentUser?.assignment) {
        <div class="festival-name">{{ currentUser!.assignment!.festivalName }}</div>
      }
      <ul class="nav-list">
        <li>
          <a routerLink="stages" routerLinkActive="active" class="nav-item">
            <span class="nav-icon">🎪</span> Stages
          </a>
        </li>
        <li>
          <a routerLink="segments" routerLinkActive="active" class="nav-item">
            <span class="nav-icon">🗂</span> Segments
          </a>
        </li>
      </ul>
    </nav>

    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
