<div class="app-container">
  <aside class="sidebar">
    <div class="brand">
      <h2>APP NAME</h2>
      <span class="subtitle">Performer Negotiations</span>
    </div>

    <nav class="nav-menu">
      <span class="menu-section-title">MAIN</span>
      <a routerLink="dashboard" routerLinkActive="active" class="nav-item">
  <i class="icon-dashboard"></i> Dashboard
</a>
      <a routerLink="offers" routerLinkActive="active" class="nav-item">
        <i class="icon-offers"></i> Offers
      </a>
      <a routerLink="./" class="nav-item disabled-link">
        <i class="icon-negotiations"></i> Negotiations
      </a>
      <a routerLink="performers" routerLinkActive="active" class="nav-item">
        <i class="icon-performers"></i> Performers
      </a>

      <span class="menu-section-title" style="margin-top: 24px;">SYSTEM</span>
      <a routerLink="workflow-templates" routerLinkActive="active" class="nav-item">
        <i class="icon-templates"></i> Workflow Templates
      </a>
      <a routerLink="./" class="nav-item disabled-link">
        <i class="icon-contracts"></i> Contracts
      </a>
      </nav>

    <div class="sidebar-footer">
      <div class="user-avatar">{{ userInitials }}</div>
      <div class="user-info">
        <span class="user-name">{{ currentManagerName }}</span>
        <span class="user-role">Negotiation Manager</span>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-header">
      <span class="app-brand-mini">APP NAME</span>
      <div class="header-actions">
        <button class="btn-notifications">Notifications <span class="notif-count">3</span></button>
        <button (click)="onLogout()" class="btn-logout-header">
          Logout
        </button>
      </div>
    </header>

    <div class="content-body">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
