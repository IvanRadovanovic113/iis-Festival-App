<div class="dashboard">
  <header class="header">
    <div class="header-content">
      <h1>Festival App</h1>
      <div class="user-info">
        @if (currentUser) {
          <span>{{ currentUser.username }} ({{ currentUser.role }})</span>
        }
        <button (click)="logout()">Odjavi se</button>
      </div>
    </div>
  </header>
  <main class="main">
    <div class="welcome-card">
      <h2>Admin Panel</h2>
      <p>Dobrodošli u Festival App administraciju.</p>
    </div>
    <div class="nav-cards">
      <a routerLink="/admin/festivals" class="nav-card">
        <div class="nav-card-icon">🎪</div>
        <div>
          <div class="nav-card-title">Festivali</div>
          <div class="nav-card-desc">Kreiranje i pregled festivala</div>
        </div>
      </a>
      <a routerLink="/admin/users" class="nav-card">
        <div class="nav-card-icon">👥</div>
        <div>
          <div class="nav-card-title">Korisnici</div>
          <div class="nav-card-desc">Pregled i dodela uloga korisnicima</div>
        </div>
      </a>
    </div>
  </main>
</div>
