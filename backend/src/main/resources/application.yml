spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/festival_db}
    username: ${SPRING_DATASOURCE_USERNAME:festival_user}
    password: ${SPRING_DATASOURCE_PASSWORD:festival_pass}
    driver-class-name: org.postgresql.Driver
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION:86400000}

server:
  port: 8080

logging:
  level:
    com.festivalapp: DEBUG

app:
  mail:
    enabled: ${APP_MAIL_ENABLED:false}
    from: ${APP_MAIL_FROM:${SPRING_MAIL_USERNAME:}}
  storage:
    upload-dir: ${APP_STORAGE_UPLOAD_DIR:uploads}
